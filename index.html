<body>

  <label class="switch">
    <input type="checkbox" id="themeToggle">

</div>

</nav>


  <div class="background"></div>

  <div class="header">
    <h1 class="typing-text"><span id="typewriter"></span><span class="cursor">|</span></h1>
    <h2>Welcome to My Portfolio</h2>
    <p>
      Hi, I'm <b>Nathan Posthumus</b>, a software developer with a passion
      for creating innovative solutions. Explore my work and let's connect!
    </p>
  </div>

  <img src="images/index.png" alt="Developer Illustration" class="index-image" />

  <script>
    const text = "Software Developer";
    const typewriter = document.getElementById("typewriter");
    const cursor = document.querySelector(".cursor");

    let index = 0;
    function type() {
      if (index < text.length) {
        typewriter.textContent += text.charAt(index);
        index++;
        setTimeout(type, 100);
      }
    }
    type();
  </script>

  <script>
  const toggle = document.getElementById('themeToggle');
  const body = document.body;

  // Load preference
  if (localStorage.getItem('theme') === 'light') {
    toggle.checked = true;
    body.classList.add('light-mode');
  }

  toggle.addEventListener('change', () => {
    body.classList.toggle('light-mode');
    localStorage.setItem('theme', body.classList.contains('light-mode') ? 'light' : 'dark');
  });
</script>

</body>
</html>
